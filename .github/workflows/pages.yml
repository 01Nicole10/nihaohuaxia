# GitHub Pages 自动部署配置
name: Deploy to GitHub Pages

# 触发条件：main分支有代码推送时自动运行
on:
  push:
    branches: ["main"]
  # 也可以手动触发部署
  workflow_dispatch:

# 权限配置（必须）
permissions:
  contents: read
  pages: write
  id-token: write

# 部署环境
environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

# 执行步骤
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 第一步：拉取仓库代码
      - name: Checkout
        uses: actions/checkout@v4

      # 第二步：配置GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 第三步：上传静态文件（根目录所有文件）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 部署仓库根目录的所有文件（包括proposals文件夹）
          path: '.'

      # 第四步：部署到GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
