# GitHub Pages 自动部署配置（修复environment报错）
name: Deploy to GitHub Pages

# 触发条件：main分支有代码推送时自动运行
on:
  push:
    branches: ["main"]
  # 手动触发部署（可选）
  workflow_dispatch:

# 权限配置（核心，不能改）
permissions:
  contents: read
  pages: write
  id-token: write

# 执行步骤（简化版，兼容所有GitHub版本）
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 第一步：拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 第二步：配置GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # 第三步：上传根目录所有文件（包括proposals）
      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署仓库根目录的所有文件

      # 第四步：部署到GitHub Pages
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
